# Mapping of tools to their upstream version sources.
# Used by check_updates.py to detect new releases.
#
# Supported source types:
#   github: owner/repo (checks GitHub Releases API)
#   pypi: package-name (checks PyPI JSON API)
#
# tag_prefix: prefix to strip from release tags (default: "v")
# tag_prefix: "" means tags have no prefix (e.g. "2.7.11b")

# --- GitHub Releases ---
minimap2:
  source: github
  repo: lh3/minimap2

gffcompare:
  source: github
  repo: gpertea/gffcompare

