name: Auto Build Tools

on:
  push:
    paths:
      - 'tools/**'
  workflow_dispatch:
    inputs:
      specific_tool:
        description: 'Specific tool to build (leave empty to build all changed tools)'
        required: false
        type: string

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed tools
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.specific_tool }}" ]; then
            # Manual workflow dispatch with specific tool
            echo "tools=[\"${{ github.event.inputs.specific_tool }}\"]" >> $GITHUB_OUTPUT
          else
            # Auto-detect changed tools from git diff
            changed_files=$(git diff --name-only HEAD^ HEAD | grep '^tools/' || true)
            if [ -z "$changed_files" ]; then
              echo "tools=[]" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            # Extract unique tool names from changed paths
            tools=$(echo "$changed_files" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "tools=$tools" >> $GITHUB_OUTPUT
            echo "Detected changed tools: $tools"
          fi

      - name: Build matrix with tool and version combinations
        id: set-matrix
        run: |
          tools='${{ steps.detect.outputs.tools }}'
          
          if [ "$tools" = "[]" ] || [ -z "$tools" ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          matrix_include="[]"
          
          for tool in $(echo "$tools" | jq -r '.[]'); do
            if [ -f "tools/$tool/versions.txt" ]; then
              versions=$(cat "tools/$tool/versions.txt" | grep -v '^#' | grep -v '^$')
              for version in $versions; do
                matrix_include=$(echo "$matrix_include" | jq -c --arg tool "$tool" --arg version "$version" '. += [{"tool": $tool, "version": $version}]')
              done
            else
              # Default to 'latest' if no versions.txt
              matrix_include=$(echo "$matrix_include" | jq -c --arg tool "$tool" --arg version "latest" '. += [{"tool": $tool, "version": $version}]')
            fi
          done
          
          matrix_json=$(echo "{\"include\":$matrix_include}" | jq -c .)
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT
          echo "Matrix: $matrix_json"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '' && needs.detect-changes.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
      max-parallel: 4
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker data-root to /mnt/docker
        run: |
          sudo df -h
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker
          sudo echo '{"data-root": "/mnt/docker"}' > /tmp/daemon.json
          sudo mv /tmp/daemon.json /etc/docker/daemon.json
          sudo systemctl start docker
          sudo df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DH_USER }}
          password: ${{ secrets.DH_TOKEN }}

      - name: Build and push ${{ matrix.tool }}:${{ matrix.version }}
        uses: docker/build-push-action@v6
        with:
          context: ./tools/${{ matrix.tool }}/
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DH_USER }}/${{ matrix.tool }}:${{ matrix.version }}
          build-args: VERSION=${{ matrix.version }}
          cache-from: type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache
          cache-to: type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache,mode=max

      - name: Retry on failure (rate limit)
        if: failure()
        run: |
          echo "First attempt failed, waiting 60s before retry..."
          sleep 60

      - name: Retry build and push
        if: failure()
        uses: docker/build-push-action@v6
        with:
          context: ./tools/${{ matrix.tool }}/
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DH_USER }}/${{ matrix.tool }}:${{ matrix.version }}
          build-args: VERSION=${{ matrix.version }}
          cache-from: type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache
          cache-to: type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache,mode=max

  update-readme:
    needs: [detect-changes, build]
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install pyyaml

      - name: Regenerate README
        run: python3 update_readme.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README is up to date"
          else
            git commit -m "docs: auto-update README.md"
            git push
          fi