name: Auto Build Tools

on:
  push:
    paths:
      - 'tools/**'
  workflow_dispatch:
    inputs:
      specific_tool:
        description: 'Specific tool to build (leave empty to build all changed tools)'
        required: false
        type: string

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.detect.outputs.tools }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Detect changed tools
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.specific_tool }}" ]; then
            # Manual workflow dispatch with specific tool
            echo "tools=[\"${{ github.event.inputs.specific_tool }}\"]" >> $GITHUB_OUTPUT
          else
            # Auto-detect changed tools from git diff
            changed_files=$(git diff --name-only HEAD^ HEAD | grep '^tools/' || true)
            if [ -z "$changed_files" ]; then
              echo "tools=[]" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            # Extract unique tool names from changed paths
            tools=$(echo "$changed_files" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "tools=$tools" >> $GITHUB_OUTPUT
            echo "Detected changed tools: $tools"
          fi

  build-amd64:
    needs: detect-changes
    if: needs.detect-changes.outputs.tools != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: ${{ fromJSON(needs.detect-changes.outputs.tools) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure Docker data-root to /mnt/docker
        run: |
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker
          sudo jq '. + {"data-root": "/mnt/docker"}' /etc/docker/daemon.json > /tmp/daemon.json || echo '{"data-root": "/mnt/docker"}' > /tmp/daemon.json
          sudo mv /tmp/daemon.json /etc/docker/daemon.json
          sudo systemctl start docker
          df -h

      - name: Read tool configuration
        id: config
        run: |
          # Check if versions.txt exists
          if [ -f "tools/${{ matrix.tool }}/versions.txt" ]; then
            versions=$(cat "tools/${{ matrix.tool }}/versions.txt" | grep -v '^#' | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "versions=$versions" >> $GITHUB_OUTPUT
          else
            # Default to a single 'latest' tag if no version file
            echo "versions=[\"latest\"]" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DH_USER }}
          password: ${{ secrets.DH_TOKEN }}

      - name: Build and push AMD64 images
        run: |
          versions='${{ steps.config.outputs.versions }}'
          for version in $(echo "$versions" | jq -r '.[]'); do
            echo "Building ${{ matrix.tool }}:$version for AMD64"
            docker buildx build \
              --platform linux/amd64 \
              --build-arg VERSION=$version \
              --tag ${{ secrets.DH_USER }}/${{ matrix.tool }}:$version-amd64 \
              --cache-from type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache-amd64 \
              --cache-to type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache-amd64,mode=max \
              --push \
              ./tools/${{ matrix.tool }}/
          done

  build-arm64:
    needs: detect-changes
    if: needs.detect-changes.outputs.tools != '[]'
    runs-on: ubuntu-24.04-arm64
    strategy:
      matrix:
        tool: ${{ fromJSON(needs.detect-changes.outputs.tools) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure Docker data-root to /mnt/docker
        run: |
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker
          sudo jq '. + {"data-root": "/mnt/docker"}' /etc/docker/daemon.json > /tmp/daemon.json || echo '{"data-root": "/mnt/docker"}' > /tmp/daemon.json
          sudo mv /tmp/daemon.json /etc/docker/daemon.json
          sudo systemctl start docker
          df -h

      - name: Read tool configuration
        id: config
        run: |
          # Check if versions.txt exists
          if [ -f "tools/${{ matrix.tool }}/versions.txt" ]; then
            versions=$(cat "tools/${{ matrix.tool }}/versions.txt" | grep -v '^#' | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "versions=$versions" >> $GITHUB_OUTPUT
          else
            # Default to a single 'latest' tag if no version file
            echo "versions=[\"latest\"]" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DH_USER }}
          password: ${{ secrets.DH_TOKEN }}

      - name: Build and push ARM64 images
        run: |
          versions='${{ steps.config.outputs.versions }}'
          for version in $(echo "$versions" | jq -r '.[]'); do
            echo "Building ${{ matrix.tool }}:$version for ARM64"
            docker buildx build \
              --platform linux/arm64 \
              --build-arg VERSION=$version \
              --tag ${{ secrets.DH_USER }}/${{ matrix.tool }}:$version-arm64 \
              --cache-from type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache-arm64 \
              --cache-to type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache-arm64,mode=max \
              --push \
              ./tools/${{ matrix.tool }}/
          done

  create-manifest:
    needs: [detect-changes, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: ${{ fromJSON(needs.detect-changes.outputs.tools) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Read tool configuration
        id: config
        run: |
          # Check if versions.txt exists
          if [ -f "tools/${{ matrix.tool }}/versions.txt" ]; then
            versions=$(cat "tools/${{ matrix.tool }}/versions.txt" | grep -v '^#' | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "versions=$versions" >> $GITHUB_OUTPUT
          else
            # Default to a single 'latest' tag if no version file
            echo "versions=[\"latest\"]" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DH_USER }}
          password: ${{ secrets.DH_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          versions='${{ steps.config.outputs.versions }}'
          for version in $(echo "$versions" | jq -r '.[]'); do
            echo "Creating manifest for ${{ matrix.tool }}:$version"
            docker buildx imagetools create \
              --tag ${{ secrets.DH_USER }}/${{ matrix.tool }}:$version \
              ${{ secrets.DH_USER }}/${{ matrix.tool }}:$version-amd64 \
              ${{ secrets.DH_USER }}/${{ matrix.tool }}:$version-arm64
          done
