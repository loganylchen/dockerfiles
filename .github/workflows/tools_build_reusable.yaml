name: Reusable Docker Build for Tools

on:
  workflow_call:
    inputs:
      tool_name:
        required: true
        type: string
        description: 'Name of the tool (e.g., minimap2, salmon)'
      tool_description:
        required: false
        type: string
        description: 'Tool description for workflow name'
      versions:
        required: true
        type: string
        description: 'JSON array of versions to build (e.g., ["2.28", "2.27"])'
      context_path:
        required: false
        type: string
        default: ''
        description: 'Docker context path (default: ./tools/{tool_name}/)'
    secrets:
      DH_USER:
        required: true
      DH_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJSON(inputs.versions) }}
      fail-fast: false
      max-parallel: 10  # 最多同时构建 10 个版本

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure Docker data-root to /mnt/docker
        run: |
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker
          sudo jq '. + {"data-root": "/mnt/docker"}' /etc/docker/daemon.json > /tmp/daemon.json || echo '{"data-root": "/mnt/docker"}' > /tmp/daemon.json
          sudo mv /tmp/daemon.json /etc/docker/daemon.json
          sudo systemctl start docker
          df -h

      - name: Set context path
        id: context
        run: |
          if [ -z "${{ inputs.context_path }}" ]; then
            echo "path=./tools/${{ inputs.tool_name }}/" >> $GITHUB_OUTPUT
          else
            echo "path=${{ inputs.context_path }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DH_USER }}
          password: ${{ secrets.DH_TOKEN }}

      - name: Build and push ${{ inputs.tool_name }}:${{ matrix.version }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.context.outputs.path }}
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DH_USER }}/${{ inputs.tool_name }}:${{ matrix.version }}
          build-args: VERSION=${{ matrix.version }}
          cache-from: type=registry,ref=${{ secrets.DH_USER }}/${{ inputs.tool_name }}:cache
          cache-to: type=registry,ref=${{ secrets.DH_USER }}/${{ inputs.tool_name }}:cache,mode=max
