name: Build and Verify Tools

on:
  push:
    branches:
      - add-feature
    paths:
      - 'tools/**'
  pull_request:
    branches:
      - main
    paths:
      - 'tools/**'
  workflow_dispatch:
    inputs:
      specific_tool:
        description: 'Specific tool to build (leave empty to build all changed tools)'
        required: false
        type: string
      skip_push:
        description: 'Skip pushing to Docker Hub (for testing)'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: docker.io

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Detect changed tools
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.specific_tool }}" ]; then
            echo "tools=[\"${{ github.event.inputs.specific_tool }}\"]" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files=$(git diff --name-only origin/main...HEAD | grep '^tools/' || true)
            if [ -z "$changed_files" ]; then
              echo "tools=[]" >> $GITHUB_OUTPUT
              exit 0
            fi
            tools=$(echo "$changed_files" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "tools=$tools" >> $GITHUB_OUTPUT
          else
            changed_files=$(git diff --name-only HEAD^ HEAD | grep '^tools/' || true)
            if [ -z "$changed_files" ]; then
              echo "tools=[]" >> $GITHUB_OUTPUT
              exit 0
            fi
            tools=$(echo "$changed_files" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "tools=$tools" >> $GITHUB_OUTPUT
          fi

      - name: Build matrix with tool and version combinations
        id: set-matrix
        run: |
          tools='${{ steps.detect.outputs.tools }}'

          if [ "$tools" = "[]" ] || [ -z "$tools" ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT

          matrix_include="[]"

          for tool in $(echo "$tools" | jq -r '.[]'); do
            if [ -f "tools/$tool/versions.txt" ]; then
              versions=$(cat "tools/$tool/versions.txt" | grep -v '^#' | grep -v '^$')
              for version in $versions; do
                matrix_include=$(echo "$matrix_include" | jq -c --arg tool "$tool" --arg version "$version" '. += [{"tool": $tool, "version": $version}]')
              done
            else
              matrix_include=$(echo "$matrix_include" | jq -c --arg tool "$tool" --arg version "latest" '. += [{"tool": $tool, "version": $version}]')
            fi
          done

          matrix_json=$(echo "{\"include\":$matrix_include}" | jq -c .)
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT
          echo "Matrix: $matrix_json"

  build-and-verify:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure Docker data-root
        run: |
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker
          sudo echo '{"data-root": "/mnt/docker"}' > /tmp/daemon.json
          sudo mv /tmp/daemon.json /etc/docker/daemon.json
          sudo systemctl start docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        if: github.event.inputs.skip_push != 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DH_USER }}
          password: ${{ secrets.DH_TOKEN }}

      - name: Build ${{ matrix.tool }}:${{ matrix.version }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./tools/${{ matrix.tool }}/
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ secrets.DH_USER }}/${{ matrix.tool }}:${{ matrix.version }}
          build-args: VERSION=${{ matrix.version }}
          cache-from: type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache
          cache-to: type=inline,mode=max

      - name: Check image size
        id: size
        run: |
          IMAGE="${{ secrets.DH_USER }}/${{ matrix.tool }}:${{ matrix.version }}"
          SIZE=$(docker image inspect "$IMAGE" --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          echo "Image size: ${SIZE_MB} MB"

          # Warning if image is too large
          if [ $SIZE_MB -gt 2000 ]; then
            echo "::warning::Image size (${SIZE_MB} MB) exceeds 2GB, consider optimization"
          fi

      - name: Detect tool type
        id: type
        run: |
          DOCKERFILE="tools/${{ matrix.tool }}/Dockerfile"
          if grep -q "r-base\|Rscript\|BiocManager" "$DOCKERFILE" 2>/dev/null; then
            echo "type=r" >> $GITHUB_OUTPUT
          elif grep -q "python\|pip" "$DOCKERFILE" 2>/dev/null; then
            echo "type=python" >> $GITHUB_OUTPUT
          elif grep -q "java\|openjdk\|temurin" "$DOCKERFILE" 2>/dev/null; then
            echo "type=java" >> $GITHUB_OUTPUT
          else
            echo "type=compiled" >> $GITHUB_OUTPUT
          fi

      - name: Verify R package installation
        if: steps.type.outputs.type == 'r'
        run: |
          IMAGE="${{ secrets.DH_USER }}/${{ matrix.tool }}:${{ matrix.version }}"
          echo "Verifying R package installation..."

          # Run R session info to verify installation
          docker run --rm "$IMAGE" Rscript -e "
            packages <- installed.packages()[,'Package'];
            cat('Installed packages:\n');
            cat(paste('-', packages), sep='\n');

            # Check for common issues
            failed <- c();
            for (pkg in packages) {
              result <- tryCatch({
                library(pkg, character.only=TRUE);
                'OK'
              }, error=function(e) {
                'FAILED'
              });
              if (result == 'FAILED') {
                failed <- c(failed, pkg);
              }
            }

            if (length(failed) > 0) {
              cat('\nFailed to load packages:\n');
              cat(paste('-', failed), sep='\n');
              quit(status=1);
            } else {
              cat('\nAll packages loaded successfully!\n');
            }
          "

          if [ $? -ne 0 ]; then
            echo "::error::R package verification failed for ${{ matrix.tool }}"
            exit 1
          fi

      - name: Verify Python package installation
        if: steps.type.outputs.type == 'python'
        run: |
          IMAGE="${{ secrets.DH_USER }}/${{ matrix.tool }}:${{ matrix.version }}"
          echo "Verifying Python package installation..."

          docker run --rm "$IMAGE" python3 -c "
            import sys;
            print('Python version:', sys.version);

            # Try to import the main package based on tool name
            tool_name = '${{ matrix.tool }}';
            try:
              __import__(tool_name);
              print(f'Successfully imported {tool_name}');
            except ImportError:
              print(f'Note: {tool_name} may have a different import name or is a command-line tool');
          "

      - name: Verify compiled tool
        if: steps.type.outputs.type == 'compiled'
        run: |
          IMAGE="${{ secrets.DH_USER }}/${{ matrix.tool }}:${{ matrix.version }}"
          echo "Verifying compiled tool..."

          # Try to run the tool with --help or --version
          docker run --rm "$IMAGE" sh -c "
            tool='${{ matrix.tool }}';
            if command -v \$tool &> /dev/null; then
              \$tool --version 2>/dev/null || \$tool --help 2>/dev/null | head -5 || echo 'Tool exists but no version/help flag';
            else
              echo 'Warning: Tool binary not found in PATH';
              ls -la /usr/local/bin/ | head -10;
            fi
          "

      - name: Push to Docker Hub
        if: github.event.inputs.skip_push != 'true' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./tools/${{ matrix.tool }}/
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DH_USER }}/${{ matrix.tool }}:${{ matrix.version }}
          build-args: VERSION=${{ matrix.version }}
          cache-from: type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache
          cache-to: type=registry,ref=${{ secrets.DH_USER }}/${{ matrix.tool }}:cache,mode=max

      - name: Report build status
        run: |
          echo "### Build Summary for ${{ matrix.tool }}:${{ matrix.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ steps.type.outputs.type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: ${{ steps.size.outputs.size_mb }} MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY

  build-summary:
    needs: [detect-changes, build-and-verify]
    if: always() && needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All changed tools have been built and verified." >> $GITHUB_STEP_SUMMARY
